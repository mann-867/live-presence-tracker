services:
  app:
    build: .
    container_name: live-presence-app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      TTL: 30
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"
